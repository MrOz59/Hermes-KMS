# DKMS configuration for the Hermes-KMS virtual display driver.
#
# DKMS copies this source tree to /usr/src/hermes-kms-<version>/ and rebuilds
# the module automatically for every installed kernel. The top-level `modules`
# target builds kernel/hermes-kms/hermes_kms.ko and already resolves the UAPI
# header include path, so we drive it from the source root.

PACKAGE_NAME="hermes-kms"
PACKAGE_VERSION="0.1.2"
AUTOINSTALL="yes"

MAKE[0]="make modules KERNELRELEASE=${kernelver} KDIR=/lib/modules/${kernelver}/build"
CLEAN="make clean KERNELRELEASE=${kernelver} KDIR=/lib/modules/${kernelver}/build"

BUILT_MODULE_NAME[0]="hermes_kms"
BUILT_MODULE_LOCATION[0]="kernel/hermes-kms"
DEST_MODULE_LOCATION[0]="/kernel/drivers/gpu/drm/hermes-kms"
