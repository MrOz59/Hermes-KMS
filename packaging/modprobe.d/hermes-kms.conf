# Default Hermes-KMS module options for compositor-driven streaming.
#
# initial_enabled=1 brings the HERMES-1 connector up connected on load, so
# KWin/GNOME enumerate and adopt it. Leave hotplug_events at its default (on)
# so connection-state changes reach the compositor. Install to /etc/modprobe.d/.
options hermes_kms initial_enabled=1
